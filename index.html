<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URLIN Shortin Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px}
input,textarea,button{
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  width:100%;
  box-sizing:border-box
}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all
}
img{max-width:100%;border-radius:10px;margin:15px 0}
.loader{
  margin:20px auto;
  width:60px;height:60px;
  border-radius:50%;
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  animation:spin 1s linear infinite
}
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
.center{display:flex;flex-direction:column;align-items:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.stat{font-size:20px;font-weight:bold}
.small{font-size:12px;color:#94a3b8}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://urlin.biz.id";
const PIN = "270491";

const articles = [
  {
    title: "Fast HD Video Downloader",
    content: "Download high-definition videos instantly with ultra-fast speed and secure cloud streaming technology. Our advanced platform supports multiple video formats including MP4, MKV, AVI, and MOV, ensuring compatibility across desktop, mobile, and tablet devices. Experience smooth playback, reliable offline saving, and optimized bandwidth usage for faster access."
  },
  {
    title: "Premium Online Video Player",
    content: "Watch premium video content online with smooth playback, adaptive quality settings, and intelligent buffering technology. Enjoy crystal-clear HD and Full HD streaming, subtitle synchronization, and immersive fullscreen mode designed for the best user experience on all devices."
  },
  {
    title: "Ultra Fast Media Delivery",
    content: "Our intelligent delivery network ensures lightning-fast access to videos and media files from any location. With optimized routing, content acceleration, and smart redirect systems, users can enjoy seamless viewing with minimal loading time and improved stability."
  },
  {
    title: "Unlimited Entertainment Access",
    content: "Access unlimited entertainment resources with secure and fast cloud-powered video technology. From educational content to premium media streaming, enjoy uninterrupted playback and instant redirects powered by high-performance infrastructure."
  },
  {
    title: "Advanced Streaming Experience",
    content: "Enjoy next-generation streaming with dynamic resolution adjustment, subtitle support, and enhanced playback controls. The system automatically adapts to your network speed, ensuring smooth and uninterrupted video access anytime."
  },
  {
    title: "Secure Redirect Technology",
    content: "Our smart redirect engine combines speed, reliability, and security to provide the best user journey. Each link is optimized for rapid delivery while maintaining accurate tracking, history logs, and click analysis for better performance insights."
  },
  {
    title: "Cloud Video Access Platform",
    content: "Modern cloud-based infrastructure allows fast media loading, secure link redirection, and high-speed content distribution. Built for scalability, the platform supports large traffic volumes with stable and efficient resource delivery."
  },
  {
    title: "Professional Media Tools",
    content: "Advanced video downloader and playback solutions help users save, manage, and watch premium content with ease.<br><br>Features include smart resume, offline storage, and high-quality rendering for a premium multimedia experience."
  },
  {
    title: "Smart Video Optimization",
    content: "Every media file is optimized for fast loading, reduced buffering, and improved compatibility.<br><br>The smart optimization engine enhances playback quality while minimizing bandwidth consumption for a smooth viewing experience."
  },
  {
    title: "Instant Redirect Access",
    content: "Fast countdown redirect technology ensures users reach their destination quickly while engaging with dynamic content and premium article displays.<br><br>Designed for performance and monetization optimization."
  },
  {
    title: "HD Media Experience",
    content: "Enjoy stunning HD media playback with advanced rendering technology, fast loading speed, and responsive design optimized for every screen size.<br><br>Experience seamless transitions and modern video delivery solutions."
  },
  {
    title: "Premium Content Gateway",
    content: "A secure gateway for accessing premium digital content, streaming resources, and downloadable video files with intelligent cloud routing and advanced click analytics."
  }
];

function randomArticle(){
  return articles[Math.floor(Math.random()*articles.length)];
}

function randomImage(){
  return "https://picsum.photos/900/400?" + Math.random();
}

function normalize(url){
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function randomCode(){
  return Math.random().toString(36).substring(2,7);
}

function generateUniqueCode(callback){
  const code = randomCode();

  db.ref("links/" + code).once("value").then(snap=>{
    if(snap.exists()){
      generateUniqueCode(callback);
    }else{
      callback(code);
    }
  });
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function login(){
  if(pin.value===PIN){
    localStorage.setItem("pin",PIN);
    dashboard();
  }else{
    alert("Wrong PIN");
  }
}

function isLogin(){
  return localStorage.getItem("pin")===PIN;
}

function showPin(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Enter PIN</h2>
        <input id="pin" type="password">
        <button onclick="login()">Unlock</button>
      </div>
    </div>
  `;
}

function saveHistory(code,url,type="single"){
  db.ref("history/"+code).set({
    code,
    url,
    type,
    clicks:0,
    createdAt:new Date().toLocaleString()
  });
}

function generate(){
  let url = urlInput.value.trim();
  if(!url) return alert("Enter URL");

  url = normalize(url);

  generateUniqueCode(code=>{
    db.ref("links/"+code).set({url});

    saveHistory(code,url,"single");

    const short = DOMAIN + "/#" + code;

    result.innerHTML = `
      <div class="item">
        ${short}
        <button onclick="copyText('${short}')">Copy</button>
      </div>
    `;

    loadAnalysis();
  });
}

function bulk(){
  const lines = bulkInput.value.split("\n").filter(x=>x.trim());
  let html = "";

  lines.forEach(link=>{
    const url = normalize(link.trim());

    generateUniqueCode(code=>{
      db.ref("links/"+code).set({url});
      saveHistory(code,url,"bulk");

      const short = DOMAIN + "/#" + code;

      html += `
        <div class="item">
          ${short}
          <button onclick="copyText('${short}')">Copy</button>
        </div>
      `;

      bulkResult.innerHTML = html;
      loadAnalysis();
    });
  });
}

function updateClick(code){
  db.ref("history/"+code).transaction(data=>{
    if(data){
      data.clicks = (data.clicks||0)+1;
      data.lastClick = new Date().toLocaleString();
    }
    return data;
  });
}

function deleteHistory(code){
  db.ref("history/"+code).remove();
  db.ref("links/"+code).remove();
  loadAnalysis();
}

function exportHistory(){
  db.ref("history").once("value").then(snap=>{
    const data = JSON.stringify(snap.val(),null,2);
    const blob = new Blob([data],{type:"application/json"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "history.json";
    a.click();
  });
}

function loadAnalysis(){
  db.ref("history").once("value").then(snap=>{
    const data = snap.val() || {};

    let totalLinks = 0;
    let totalClicks = 0;
    let top = [];
    let html = "";

    Object.values(data).forEach(item=>{
      totalLinks++;
      totalClicks += item.clicks || 0;
      top.push(item);

      html += `
        <div class="item">
          <b>${item.code}</b><br>
          ${item.url}<br>
          Type: ${item.type}<br>
          Clicks: ${item.clicks || 0}<br>
          Created: ${item.createdAt}<br>
          <button onclick="deleteHistory('${item.code}')">Delete</button>
        </div>
      `;
    });

    top.sort((a,b)=>(b.clicks||0)-(a.clicks||0));

    analysis.innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="stat">${totalLinks}</div>
          <div class="small">Total Links</div>
        </div>
        <div class="card">
          <div class="stat">${totalClicks}</div>
          <div class="small">Total Clicks</div>
        </div>
      </div>

      <div class="card">
        <h3>Top Clicked</h3>
        ${(top[0]) ? `
          <div class="item">
            ${top[0].code}<br>
            Clicks: ${top[0].clicks || 0}
          </div>
        ` : "No data"}
      </div>

      <div class="card">
        <h3>Full History</h3>
        ${html}
      </div>
    `;
  });
}

function dashboard(){
  app.innerHTML = `
    <div class="container">

      <div class="card">
        <h2>Create Shortlink</h2>
        <input id="urlInput" placeholder="Enter URL">
        <button onclick="generate()">Generate</button>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>Bulk Generator</h2>
        <textarea id="bulkInput" rows="6"></textarea>
        <button onclick="bulk()">Generate Bulk</button>
        <div id="bulkResult"></div>
      </div>

      <div class="card">
        <button onclick="exportHistory()">Export JSON</button>
      </div>

      <div id="analysis"></div>

    </div>
  `;

  loadAnalysis();
}

function redirectPage(target,code){
  updateClick(code);

  let sec = Math.floor(Math.random()*3)+5;

  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Premium Video Access</h2>
        <img src="${randomImage()}">
        <p>${randomArticle()}</p>
        <div class="center">
          <div class="loader"></div>
          <p id="count"></p>
        </div>
      </div>
    </div>
  `;

  const timer = setInterval(()=>{
    count.innerText = "Redirect in " + sec + " sec";
    sec--;

    if(sec < 0){
      clearInterval(timer);
      window.location.replace(target);
    }
  },300);
}

window.onload = ()=>{
  const code = location.hash.replace("#","");

  if(code){
    db.ref("links/"+code).once("value").then(snap=>{
      const data = snap.val();

      if(data && data.url){
        redirectPage(data.url,code);
      }else{
        document.body.innerHTML="<h2 style='text-align:center'>Link not found</h2>";
      }
    });
    return;
  }

  if(isLogin()) dashboard();
  else showPin();
}
</script>
</body>
</html>
