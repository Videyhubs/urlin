<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://urlin.biz.id";
const PIN = "270491";

// LOGIN
function showPin(){
  app.innerHTML = `
  <div class='container'><div class='card'>
  <h2>Enter PIN</h2>
  <input id='pin' type='password'>
  <button onclick='login()'>Unlock</button>
  </div></div>`;
}

function login(){
  if(pin.value===PIN){
    localStorage.setItem('urlin_pin',PIN);
    dashboard();
  } else alert('Wrong PIN');
}

function isLogin(){
  return localStorage.getItem('urlin_pin')===PIN;
}

// UTIL
function normalize(u){
  return /^https?:\/\//i.test(u)?u:"https://"+u;
}

function randomCode(){
  return Math.random().toString(36).substring(2,6);
}

function copy(t){
  navigator.clipboard.writeText(t);
  alert('Copied');
}

// RANDOM ARTICLE SYSTEM
const articles = [
  {
    title: "Fast Video Downloader Online",
    text: "Download videos instantly in HD quality with support for MP4, AVI, and MKV formats."
  },
  {
    title: "Best Media Player Experience",
    text: "Enjoy smooth playback, subtitle sync, and full-screen viewing on all devices."
  },
  {
    title: "Watch & Save Videos Easily",
    text: "Modern downloader tools now support fast cloud delivery and instant streaming."
  },
  {
    title: "Unlimited Video Access",
    text: "Save content offline and enjoy playback anytime without buffering."
  },
  {
    title: "Secure Video Streaming",
    text: "Advanced streaming technology ensures safe and fast viewing experience."
  }
];

function getArticle(){
  const item = articles[Math.floor(Math.random()*articles.length)];
  const img = "https://picsum.photos/800/400?" + Math.random();

  return `
    <h2>${item.title}</h2>
    <img src="${img}">
    <p>${item.text}</p>
  `;
}

// SAVE HISTORY
function saveHistory(code,url){
  const time = new Date().toLocaleString();

  db.ref('history/' + code).set({
    code,
    url,
    createdAt: time,
    clicks: 0
  });
}

// UPDATE ANALYTICS
function addClick(code){
  db.ref('history/' + code).transaction(data=>{
    if(!data) return null;
    data.clicks = (data.clicks || 0) + 1;
    data.lastClick = new Date().toLocaleString();
    return data;
  });
}

// GENERATE
function generate(){
  let url = document.getElementById('url').value;
  if(!url) return alert('Enter URL');

  url = normalize(url);
  let code = randomCode();

  db.ref('links/'+code).set({url:url});
  saveHistory(code,url);

  const short = DOMAIN + '/#' + code;

  document.getElementById('result').innerHTML = `
  <div class='item'>${short}<br>
  <button onclick="copy('${short}')">Copy</button>
  </div>`;

  loadAnalysis();
}

function bulk(){
  const list = document.getElementById('bulk').value
    .split("\n")
    .filter(x=>x.trim());

  let html="";

  list.forEach(u=>{
    let url = normalize(u);
    let code = randomCode();

    db.ref('links/'+code).set({url:url});
    saveHistory(code,url);

    const short = DOMAIN + '/#' + code;

    html += `
      <div class='item'>
        ${short}<br>
        <button onclick="copy('${short}')">Copy</button>
      </div>`;
  });

  document.getElementById('bulkResult').innerHTML = html;
  loadAnalysis();
}

// ANALYSIS
function loadAnalysis(){
  db.ref('history').once('value').then(snap=>{
    const data = snap.val() || {};
    let totalLinks = 0;
    let totalClicks = 0;
    let html = "";

    Object.values(data).forEach(item=>{
      totalLinks++;
      totalClicks += item.clicks || 0;

      html += `
      <div class='item'>
        <b>${item.code}</b><br>
        URL: ${item.url}<br>
        Clicks: ${item.clicks || 0}<br>
        Created: ${item.createdAt}
      </div>`;
    });

    document.getElementById('analysis').innerHTML = `
      <h3>Total Links: ${totalLinks}</h3>
      <h3>Total Clicks: ${totalClicks}</h3>
      ${html}
    `;
  });
}

// DASHBOARD
function dashboard(){
  app.innerHTML = `
  <div class='container'>

    <div class='card'>
      <h2>Create Shortlink</h2>
      <input id='url' placeholder='Enter URL'>
      <button onclick='generate()'>Generate</button>
      <div id='result'></div>
    </div>

    <div class='card'>
      <h2>Bulk Generator</h2>
      <textarea id='bulk'></textarea>
      <button onclick='bulk()'>Generate Bulk</button>
      <div id='bulkResult'></div>
    </div>

    <div class='card'>
      <h2>History & Analysis</h2>
      <div id='analysis'></div>
    </div>

  </div>`;

  loadAnalysis();
}

// REDIRECT
function redirectPage(target,code){
  addClick(code);

  const delay = Math.floor(Math.random()*3)+5;

  app.innerHTML = `
  <div class='container'>
    <div class='card'>
      ${getArticle()}
      <div class='center'>
        <div class='loader'></div>
        <p id='count'></p>
      </div>
    </div>
  </div>`;

  let t = delay;
  const timer = setInterval(()=>{
    document.getElementById('count').innerText =
      "Redirect in " + t + " sec";
    t--;

    if(t<0){
      clearInterval(timer);
      window.location.replace(target);
    }
  },300);
}

// ROUTER
window.onload = ()=>{
  const code = location.hash.replace('#','');

  if(code){
    db.ref('links/'+code).once('value').then(snap=>{
      const data = snap.val();

      if(data && data.url){
        redirectPage(data.url,code);
      } else {
        document.body.innerHTML =
          "<h2 style='text-align:center'>Link not found</h2>";
      }
    });
    return;
  }

  if(isLogin()) dashboard();
  else showPin();
}
</script>
