<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URLIN Shortin Pro</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1220;
  color:#fff
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px
}
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-top:20px
}
input,textarea,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box
}
button{
  background:#22c55e;
  color:#fff;
  cursor:pointer
}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all
}
img{
  max-width:100%;
  border-radius:10px;
  margin:15px 0
}
.loader{
  margin:20px auto;
  width:60px;
  height:60px;
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite
}
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
.center{
  display:flex;
  flex-direction:column;
  align-items:center
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px
}
.stat{
  font-size:24px;
  font-weight:bold
}
.small{
  font-size:12px;
  color:#94a3b8
}
.article p{
  line-height:1.8;
  text-align:justify
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://urlin.biz.id";
const PIN = "270491";

const redirectPool = [
  "https://google.com",
  "https://youtube.com",
  "https://bing.com"
];

const rssFeeds = [
  "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml",
  "https://feeds.bbci.co.uk/news/rss.xml",
  "https://www.theguardian.com/world/rss"
];

function getRandomFeed(){
  return rssFeeds[Math.floor(Math.random()*rssFeeds.length)];
}

function getSmartRedirect(target){
  const pool = [...redirectPool, target];
  return pool[Math.floor(Math.random()*pool.length)];
}

function normalize(url){
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function randomCode(){
  return Math.random().toString(36).substring(2,7);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function login(){
  if(pin.value===PIN){
    localStorage.setItem("pin",PIN);
    dashboard();
  }else{
    alert("Wrong PIN");
  }
}

function isLogin(){
  return localStorage.getItem("pin")===PIN;
}

function showPin(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Enter PIN</h2>
        <input id="pin" type="password">
        <button onclick="login()">Unlock</button>
      </div>
    </div>
  `;
}

function saveHistory(code,url){
  db.ref("history/"+code).set({
    code,
    url,
    clicks:0,
    createdAt:new Date().toLocaleString()
  });
}

function generate(){
  let url = urlInput.value.trim();
  if(!url) return alert("Enter URL");

  url = normalize(url);
  const code = randomCode();

  db.ref("links/"+code).set({url});
  saveHistory(code,url);

  const short = DOMAIN + "/#" + code;

  result.innerHTML = `
    <div class="item">
      ${short}
      <button onclick="copyText('${short}')">Copy</button>
    </div>
  `;

  loadAnalysis();
}

function bulk(){
  const lines = bulkInput.value.split("\n").filter(x=>x.trim());
  let html = "";

  lines.forEach(link=>{
    const code = randomCode();
    const url = normalize(link);

    db.ref("links/"+code).set({url});
    saveHistory(code,url);

    html += `
      <div class="item">
        ${DOMAIN}/#${code}
      </div>
    `;
  });

  bulkResult.innerHTML = html;
  loadAnalysis();
}

function loadAnalysis(){
  db.ref("history").once("value").then(snap=>{
    const data = snap.val() || {};
    let totalLinks = 0;
    let totalClicks = 0;

    Object.values(data).forEach(x=>{
      totalLinks++;
      totalClicks += x.clicks || 0;
    });

    analysis.innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="stat">${totalLinks}</div>
          <div class="small">Total Links</div>
        </div>
        <div class="card">
          <div class="stat">${totalClicks}</div>
          <div class="small">Total Clicks</div>
        </div>
      </div>
    `;
  });
}

function updateClick(code){
  db.ref("history/"+code).transaction(data=>{
    if(data){
      data.clicks = (data.clicks || 0)+1;
    }
    return data;
  });
}

async function fetchRandomArticle(){
  const feed = getRandomFeed();

  try{
    const proxy = "https://api.allorigins.win/raw?url=";
    const res = await fetch(proxy + encodeURIComponent(feed));
    const xmlText = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(xmlText,"text/xml");

    const items = xml.querySelectorAll("item");

    if(!items.length){
      return defaultArticle();
    }

    const item = items[Math.floor(Math.random()*items.length)];

    const title =
      item.querySelector("title")?.textContent ||
      "Latest News";

    const desc =
      item.querySelector("description")?.textContent ||
      "Loading premium content";

    return `
      <div class="article">
        <h2>${title}</h2>
        <img src="https://picsum.photos/900/400?${Math.random()}">
        <p>${desc}</p>
        <button onclick="nextArticle()">Next Article</button>
      </div>
    `;
  }catch(e){
    return defaultArticle();
  }
}

function defaultArticle(){
  return `
    <div class="article">
      <h2>Premium Content Access</h2>
      <img src="https://picsum.photos/900/400?${Math.random()}">
      <p>
        Welcome to our premium media access page.
        Dynamic content is loaded here before
        redirecting securely to the destination.
      </p>
      <button onclick="nextArticle()">Next Article</button>
    </div>
  `;
}

async function nextArticle(){
  const box = document.getElementById("articleBox");
  box.innerHTML = "<p>Loading next article...</p>";
  box.innerHTML = await fetchRandomArticle();
}

function dashboard(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Create Shortlink</h2>
        <input id="urlInput" placeholder="Enter URL">
        <button onclick="generate()">Generate</button>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>Bulk Generator</h2>
        <textarea id="bulkInput" rows="5"></textarea>
        <button onclick="bulk()">Generate Bulk</button>
        <div id="bulkResult"></div>
      </div>

      <div id="analysis"></div>
    </div>
  `;

  loadAnalysis();
}

function redirectPage(target,code){
  updateClick(code);

  let sec = 3;
  const smartTarget = getSmartRedirect(target);

  app.innerHTML = `
    <div class="container">
      <div class="card">
        <div id="articleBox">
          <p>Loading article...</p>
        </div>

        <div class="center">
          <div class="loader"></div>
          <p id="count"></p>
          <button onclick="window.location.href='${smartTarget}'">
            Skip Now
          </button>
        </div>
      </div>
    </div>
  `;

  fetchRandomArticle().then(html=>{
    articleBox.innerHTML = html;
  });

  const timer = setInterval(()=>{
    count.innerText = "Redirect in " + sec + " sec";
    sec--;

    if(sec < 0){
      clearInterval(timer);
      window.location.replace(smartTarget);
    }
  },1000);
}

window.onload = ()=>{
  const code = location.hash.replace("#","");

  if(code){
    db.ref("links/"+code).once("value").then(snap=>{
      const data = snap.val();

      if(data && data.url){
        redirectPage(data.url,code);
      }else{
        document.body.innerHTML =
          "<h2 style='text-align:center'>Link not found</h2>";
      }
    });
    return;
  }

  if(isLogin()) dashboard();
  else showPin();
}
</script>
</body>
</html>
