<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URLIN Shortin Pro</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#111827;padding:20px;border-radius:15px;margin-top:20px}
input,textarea,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box
}
button{background:#22c55e;color:#fff;cursor:pointer}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all
}
img{max-width:100%;border-radius:10px;margin:15px 0}
.loader{
  margin:20px auto;
  width:60px;height:60px;
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite
}
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
.center{display:flex;flex-direction:column;align-items:center}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.stat{font-size:24px;font-weight:bold}
.small{font-size:12px;color:#94a3b8}
.article p{
  line-height:1.8;
  text-align:justify;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div id="app"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://urlin.biz.id";
const PIN = "270491";

const articles = [
{
title:"Ultimate HD Video Downloader and Streaming Experience",
content:`
Modern digital media platforms have transformed the way people consume video content online. High-definition video downloading and streaming technology now offers users the ability to access premium content quickly, securely, and without interruption. With advanced optimization systems, videos can be delivered in multiple formats including MP4, AVI, MKV, and MOV, making them compatible with almost every device available today.

Users increasingly demand faster access, smoother playback, and reliable offline viewing capabilities. This is why modern streaming systems use intelligent cloud routing and adaptive quality technology to automatically adjust playback quality according to internet speed. As a result, viewers can continue watching without buffering even when the network becomes unstable.

Another major advantage is secure delivery. Advanced encryption and redirect systems help ensure that content remains protected while maintaining rapid access times. This technology is especially important for premium video platforms and professional media tools.

Offline support is also one of the most requested features in modern video systems. Users can save content directly to their devices and watch later without requiring a constant internet connection. This improves accessibility and convenience, especially for mobile users.

With the integration of cloud acceleration, content distribution networks, and smart redirect technology, video delivery systems have become significantly more efficient. This allows content creators and platform owners to scale traffic more effectively while maintaining excellent user experience.

The future of video streaming continues to evolve rapidly with AI-based optimization, better compression algorithms, and improved compatibility across browsers and operating systems. This ensures long-term performance and user satisfaction for both content providers and viewers.
`
},
{
title:"Premium Media Access and Smart Redirect Technology",
content:`
Smart redirect technology has become an essential part of modern web infrastructure, especially for content delivery, shortlink systems, and premium media access platforms. It enables users to be redirected quickly and securely to the intended destination while maintaining advanced analytics and click-tracking capabilities.

The system works by creating lightweight URLs that route users through optimized servers. During this process, important data such as click count, access time, and device behavior can be recorded for analysis purposes. This allows administrators to monitor traffic trends and improve performance over time.

One of the strongest benefits of smart redirect technology is monetization potential. By displaying optimized content, countdown timers, or promotional articles before redirecting users, platforms can increase engagement and improve revenue opportunities.

Security also plays a crucial role. Redirect systems often include anti-abuse mechanisms, rate-limiting, and validation layers to prevent malicious access or bot traffic. These systems help preserve both data integrity and user trust.

In addition, modern redirect platforms now integrate responsive article layouts, random content rotation, and dynamic image rendering to make the redirect page feel more premium and engaging. This improves dwell time and creates a better overall user experience.

With cloud-based architecture and scalable database integration, these systems can handle large volumes of traffic while remaining stable and fast. This makes them suitable for professional shortlink services, media portals, and digital marketing campaigns.
`
}
];

function randomArticle(){
  const item = articles[Math.floor(Math.random()*articles.length)];
  return `
    <div class="article">
      <h2>${item.title}</h2>
      <img src="https://picsum.photos/900/400?${Math.random()}">
      <p>${item.content}</p>
    </div>
  `;
}

function normalize(url){
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function randomCode(){
  return Math.random().toString(36).substring(2,7);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function login(){
  if(pin.value===PIN){
    localStorage.setItem("pin",PIN);
    dashboard();
  }else{
    alert("Wrong PIN");
  }
}

function isLogin(){
  return localStorage.getItem("pin")===PIN;
}

function showPin(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Enter PIN</h2>
        <input id="pin" type="password">
        <button onclick="login()">Unlock</button>
      </div>
    </div>
  `;
}

function saveHistory(code,url){
  db.ref("history/"+code).set({
    code,url,
    clicks:0,
    createdAt:new Date().toLocaleString()
  });
}

function generate(){
  let url = urlInput.value.trim();
  if(!url) return alert("Enter URL");

  url = normalize(url);
  const code = randomCode();

  db.ref("links/"+code).set({url});
  saveHistory(code,url);

  const short = DOMAIN + "/#" + code;

  result.innerHTML = `
    <div class="item">
      ${short}
      <button onclick="copyText('${short}')">Copy</button>
    </div>
  `;

  loadAnalysis();
}

function bulk(){
  const lines = bulkInput.value.split("\n").filter(x=>x.trim());

  let html = "";

  lines.forEach(link=>{
    const code = randomCode();
    const url = normalize(link);

    db.ref("links/"+code).set({url});
    saveHistory(code,url);

    html += `
      <div class="item">
        ${DOMAIN}/#${code}
      </div>
    `;
  });

  bulkResult.innerHTML = html;
  loadAnalysis();
}

function loadAnalysis(){
  db.ref("history").once("value").then(snap=>{
    const data = snap.val() || {};

    let totalLinks = 0;
    let totalClicks = 0;

    Object.values(data).forEach(x=>{
      totalLinks++;
      totalClicks += x.clicks || 0;
    });

    analysis.innerHTML = `
      <div class="grid">
        <div class="card">
          <div class="stat">${totalLinks}</div>
          <div class="small">Total Links</div>
        </div>
        <div class="card">
          <div class="stat">${totalClicks}</div>
          <div class="small">Total Clicks</div>
        </div>
      </div>
    `;
  });
}

function updateClick(code){
  db.ref("history/"+code).transaction(data=>{
    if(data){
      data.clicks = (data.clicks||0)+1;
    }
    return data;
  });
}

function dashboard(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Create Shortlink</h2>
        <input id="urlInput" placeholder="Enter URL">
        <button onclick="generate()">Generate</button>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>Bulk Generator</h2>
        <textarea id="bulkInput" rows="5"></textarea>
        <button onclick="bulk()">Generate Bulk</button>
        <div id="bulkResult"></div>
      </div>

      <div id="analysis"></div>
    </div>
  `;

  loadAnalysis();
}

function redirectPage(target,code){
  updateClick(code);

  let sec = 5;

  app.innerHTML = `
    <div class="container">
      <div class="card">
        ${randomArticle()}
        <div class="center">
          <div class="loader"></div>
          <p id="count"></p>
        </div>
      </div>
    </div>
  `;

  const timer = setInterval(()=>{
    count.innerText = "Redirect in " + sec + " sec";
    sec--;

    if(sec < 0){
      clearInterval(timer);
      window.location.replace(target);
    }
  },300);
}

window.onload = ()=>{
  const code = location.hash.replace("#","");

  if(code){
    db.ref("links/"+code).once("value").then(snap=>{
      const data = snap.val();

      if(data && data.url){
        redirectPage(data.url,code);
      }else{
        document.body.innerHTML="<h2 style='text-align:center'>Link not found</h2>";
      }
    });
    return;
  }

  if(isLogin()) dashboard();
  else showPin();
}
</script>
</body>
</html>
