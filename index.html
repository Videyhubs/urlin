<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URLIN Shortin</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0b1220;
  color:#fff;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.card{
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
input,textarea,button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}
button{
  background:#22c55e;
  color:#fff;
  cursor:pointer;
  font-weight:bold;
}
.item{
  background:#020617;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}
img{
  max-width:100%;
  border-radius:10px;
  margin:15px 0;
}
.loader{
  margin:20px auto;
  width:60px;
  height:60px;
  border:5px solid #1f2937;
  border-top:5px solid #22c55e;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{
  0%{transform:rotate(0)}
  100%{transform:rotate(360deg)}
}
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
}
.article{
  line-height:1.9;
}
.article p{
  text-align:justify;
}
.sticky-cta{
  position:sticky;
  bottom:15px;
  z-index:999;
  margin-top:20px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="article.js"></script>
</head>
<body>
<div id="app"></div>

<script>
const app = document.getElementById("app");

const firebaseConfig = {
  apiKey: "AIzaSyBzGiN1aokAnaXHVF38ahFVAdHqSf5n8QY",
  authDomain: "urlin-shortin.firebaseapp.com",
  databaseURL: "https://urlin-shortin-default-rtdb.firebaseio.com",
  projectId: "urlin-shortin",
  storageBucket: "urlin-shortin.firebasestorage.app",
  messagingSenderId: "401542928080",
  appId: "1:401542928080:web:53d4d79b7b76eb6141b0d5"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const DOMAIN = "https://urlin.biz.id";
const PIN = "270491";

function getRedirectTime(){
  return parseInt(localStorage.getItem("redirect_time")) || 3;
}

function saveRedirectTime(){
  const value = parseInt(document.getElementById("redirectTime").value);

  if(!value || value < 1){
    alert("Minimum 1 second");
    return;
  }

  localStorage.setItem("redirect_time", value);
  alert("Saved");
}

function normalize(url){
  return /^https?:\/\//i.test(url) ? url : "https://" + url;
}

function randomCode(){
  return Math.random().toString(36).substring(2,7);
}

function copyText(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function login(){
  const pinInput = document.getElementById("pin");
  if(pinInput.value === PIN){
    localStorage.setItem("pin", PIN);
    dashboard();
  }else{
    alert("Wrong PIN");
  }
}

function isLogin(){
  return localStorage.getItem("pin") === PIN;
}

function showPin(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Enter PIN</h2>
        <input id="pin" type="password">
        <button onclick="login()">Unlock</button>
      </div>
    </div>
  `;
}

function generate(){
  const input = document.getElementById("urlInput");
  let url = input.value.trim();

  if(!url) return alert("Enter URL");

  url = normalize(url);
  const code = randomCode();

  db.ref("links/" + code).set({ url });

  document.getElementById("result").innerHTML = `
    <div class="item">
      ${DOMAIN}/#${code}
      <button onclick="copyText('${DOMAIN}/#${code}')">Copy</button>
    </div>
  `;
}

function dashboard(){
  app.innerHTML = `
    <div class="container">
      <div class="card">
        <h2>Create Shortlink</h2>
        <input id="urlInput" placeholder="Enter URL">
        <button onclick="generate()">Generate</button>
        <div id="result"></div>
      </div>

      <div class="card">
        <h2>Redirect Time</h2>
        <input id="redirectTime" type="number" min="1" value="${getRedirectTime()}">
        <button onclick="saveRedirectTime()">Save</button>
      </div>
    </div>
  `;
}

function redirectPage(target){
  if(!target){
    app.innerHTML = "<h2 style='text-align:center'>Invalid target URL</h2>";
    return;
  }

  let sec = getRedirectTime();
  const article = getRandomArticle();

  app.innerHTML = `
    <div class="container">
      <div class="card">
        <div class="article">
          <small>
            ${article.category.toUpperCase()} •
            ${article.publishDate} •
            ${article.author} •
            ${article.readTime}
          </small>

          <h2>${article.title}</h2>

          <small>/${article.slug}</small>

          <p><i>${article.metaDescription}</i></p>

          <img src="https://picsum.photos/900/400?random=${Date.now()}">

          ${article.content}

          <div class="sticky-cta">
            <a href="https://whatsapp.com/channel/0029VbDTbKN4CrfZ5GOmdY0i" target="_blank">
              <button>Join WhatsApp Channel</button>
            </a>
          </div>
        </div>

        <div class="center">
          <div class="loader"></div>
          <p id="count">Redirect in ${sec} sec</p>
        </div>
      </div>
    </div>
  `;

  const countEl = document.getElementById("count");

  const timer = setInterval(()=>{
    sec--;

    if(countEl){
      countEl.innerText = "Redirect in " + sec + " sec";
    }

    if(sec <= 0){
      clearInterval(timer);

      try{
        window.location.href = target;
      }catch(e){
        app.innerHTML = "<h2 style='text-align:center'>Redirect failed</h2>";
      }
    }
  },1000);
}

window.onload = function(){
  const code = location.hash.replace("#","");

  if(code){
    db.ref("links/" + code).once("value")
      .then(snapshot=>{
        const data = snapshot.val();

        if(data && data.url){
          redirectPage(data.url);
        }else{
          app.innerHTML = "<h2 style='text-align:center'>Link not found</h2>";
        }
      })
      .catch(()=>{
        app.innerHTML = "<h2 style='text-align:center'>Error loading link</h2>";
      });

    return;
  }

  if(isLogin()) dashboard();
  else showPin();
};
</script>
</body>
</html>
